<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Værkart – varsel fra Yr/MET på OpenStreetMap</title>
  <meta name="description" content="Interaktivt værkart med varsel fra Meteorologisk institutt (Yr) oppå OpenStreetMap. Spill av været fremover i tid.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌦️</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <h1 class="title">🌦️ Værkart</h1>
    <div class="search">
      <input id="search-input" type="search" placeholder="Søk etter sted …" autocomplete="off" spellcheck="false">
      <ul id="search-results" class="search-results" hidden></ul>
    </div>
    <button id="geo-btn" class="icon-btn" title="Vis været der jeg er" aria-label="Min posisjon">📍</button>
    <button id="theme-btn" class="icon-btn" title="Bytt mellom lys og mørk modus" aria-label="Lys/mørk modus">🌙</button>
  </header>

  <div id="map"></div>

  <!-- Tidslinje med avspilling -->
  <div class="timebar">
    <button id="play-btn" class="play-btn" title="Spill av været fremover (mellomrom)" aria-label="Spill av">▶</button>
    <button id="now-btn" class="now-btn" title="Hopp tilbake til nå">Nå</button>
    <div class="timebar-main">
      <div class="timebar-label">
        <span id="time-label">–</span>
      </div>
      <input id="time-slider" type="range" min="0" max="0" value="0" step="1">
    </div>
    <div class="timebar-speed">
      <label for="speed-select" class="visually-hidden">Hastighet</label>
      <select id="speed-select" title="Avspillingshastighet">
        <option value="900">Sakte</option>
        <option value="500" selected>Normal</option>
        <option value="250">Rask</option>
      </select>
    </div>
  </div>

  <!-- Detaljpanel: langtidsvarsel for klikket punkt -->
  <aside id="detail-panel" class="detail-panel" hidden>
    <div class="detail-header">
      <h2 id="detail-title">Varsel</h2>
      <button id="detail-close" class="detail-close" title="Lukk" aria-label="Lukk panel">×</button>
    </div>
    <div id="detail-body" class="detail-body">
      <p class="muted">Laster varsel …</p>
    </div>
  </aside>

  <div id="status-toast" class="status-toast" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
